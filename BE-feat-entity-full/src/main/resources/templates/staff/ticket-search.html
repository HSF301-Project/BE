<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tra Cuu Ve</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: #2c3e50; color: white; padding: 1rem 2rem; }
        .navbar a { color: white; text-decoration: none; margin-right: 1.5rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; margin-bottom: 2rem; }
        .search-card { background: white; border-radius: 10px; padding: 2rem; }
        .search-form { display: flex; flex-direction: column; gap: 1rem; }
        .search-form label { font-weight: 600; color: #2c3e50; text-align: left; }
        .search-form input { padding: 0.8rem; border: 1px solid #bdc3c7; border-radius: 5px; }
        .btn-search { background: #3498db; color: white; padding: 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: #95a5a6; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ecf0f1; }
        .btn-back { display: inline-block; background: #95a5a6; color: white; padding: 0.7rem 1.5rem; border-radius: 5px; text-decoration: none; margin-bottom: 1rem; }
        .error { background: #e74c3c; color: white; padding: 1rem; border-radius: 5px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/staff/dashboard">Dashboard</a>
        <a href="/staff/tickets/search">Tra Cuu Ve</a>
    </nav>
    
    <div class="container">
        <a href="/staff/dashboard" class="btn-back"> Quay Lai</a>
        <h2>Tra Cuu Ve</h2>
        <p>Nhap ma ve hoac so dien thoai de tim kiem</p>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <div class="search-card">
            <form class="search-form" action="/staff/tickets/search/by-code" method="get">
                <label>Tim Theo Ma Ve</label>
                <input type="text" name="ticketCode" placeholder="Nhap ma ve" required>
                <button type="submit" class="btn-search">Tim Kiem</button>
            </form>
            
            <div class="divider">HOAC</div>
            
            <form class="search-form" action="/staff/tickets/search/by-phone" method="get">
                <label>Tim Theo So Dien Thoai</label>
                <input type="text" name="phone" placeholder="Nhap so dien thoai" required>
                <button type="submit" class="btn-search">Tim Kiem</button>
            </form>
        </div>
    </div>
</body>
</html>
