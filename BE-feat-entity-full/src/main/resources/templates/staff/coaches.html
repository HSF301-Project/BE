<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sach Xe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: #2c3e50; color: white; padding: 1rem 2rem; }
        .navbar a { color: white; text-decoration: none; margin-right: 1.5rem; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f8f9fa; }
        .btn-back { display: inline-block; background: #95a5a6; color: white; padding: 0.7rem 1.5rem; border-radius: 5px; text-decoration: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/staff/dashboard">Dashboard</a>
        <a href="/staff/coaches">Danh Sach Xe</a>
        <a href="/staff/routes">Tuyen Duong</a>
        <a href="/staff/trips">Chuyen Xe</a>
        <a href="/staff/tickets/search">Tra Cuu Ve</a>
    </nav>
    
    <div class="container">
        <a href="/staff/dashboard" class="btn-back"> Quay Lai</a>
        <h2>Danh Sach Xe Khach</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Bien So Xe</th>
                    <th>Loai Xe</th>
                    <th>Tong So Ghe</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="coach : ${coaches}">
                    <td th:text="${coach.id}"></td>
                    <td th:text="${coach.plateNumber}"></td>
                    <td th:text="${coach.coachType}"></td>
                    <td th:text="${coach.totalSeats}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
