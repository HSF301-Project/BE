<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiet Ve</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: #2c3e50; color: white; padding: 1rem 2rem; }
        .navbar a { color: white; text-decoration: none; margin-right: 1.5rem; }
        .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; }
        .ticket-card { background: white; border-radius: 10px; overflow: hidden; }
        .ticket-header { background: #3498db; color: white; padding: 1.5rem; text-align: center; }
        .ticket-header h3 { font-size: 1.8rem; letter-spacing: 2px; }
        .ticket-body { padding: 2rem; }
        .detail-section { margin-bottom: 1.5rem; }
        .detail-section h4 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .detail-row { display: flex; padding: 0.5rem 0; }
        .detail-label { font-weight: 600; color: #7f8c8d; width: 150px; }
        .detail-value { color: #2c3e50; }
        .btn-back { display: inline-block; background: #95a5a6; color: white; padding: 0.7rem 1.5rem; border-radius: 5px; text-decoration: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/staff/dashboard">Dashboard</a>
        <a href="/staff/tickets/search">Tra Cuu Ve</a>
    </nav>
    
    <div class="container">
        <a href="/staff/tickets/search" class="btn-back"> Quay Lai</a>
        <h2>Chi Tiet Ve</h2>
        <div class="ticket-card" th:if="${ticket}">
            <div class="ticket-header">
                <h3 th:text="${ticket.ticketCode}"></h3>
                <p>Ve Xe Khach</p>
            </div>
            <div class="ticket-body">
                <div class="detail-section">
                    <h4>Thong Tin Hanh Khach</h4>
                    <div class="detail-row">
                        <span class="detail-label">Ho Ten:</span>
                        <span class="detail-value" th:text="${ticket.passengerName}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">So Ghe:</span>
                        <span class="detail-value" th:text="${ticket.seat.seatNumber}"></span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h4>Thong Tin Chuyen Xe</h4>
                    <div class="detail-row">
                        <span class="detail-label">Tuyen Duong:</span>
                        <span class="detail-value" th:text="${ticket.booking.trip.route.departureLocation.name + ' -> ' + ticket.booking.trip.route.arrivalLocation.name}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Ngay Gio:</span>
                        <span class="detail-value" th:text="${#temporals.format(ticket.booking.trip.departureTime, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Bien So Xe:</span>
                        <span class="detail-value" th:text="${ticket.booking.trip.coach.plateNumber}"></span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h4>Thong Tin Dat Ve</h4>
                    <div class="detail-row">
                        <span class="detail-label">Nguoi Dat:</span>
                        <span class="detail-value" th:text="${ticket.booking.user != null ? ticket.booking.user.fullName : 'Khach hang'}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">SDT:</span>
                        <span class="detail-value" th:text="${ticket.booking.user != null ? ticket.booking.user.phone : '-'}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Trang Thai:</span>
                        <span class="detail-value" th:text="${ticket.booking.status}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
