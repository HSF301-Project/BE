<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sach Chuyen Xe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: #2c3e50; color: white; padding: 1rem 2rem; }
        .navbar a { color: white; text-decoration: none; margin-right: 1.5rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; }
        .filter-form { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .form-group label { font-weight: 600; color: #2c3e50; }
        .form-group select, .form-group input { padding: 0.7rem; border: 1px solid #bdc3c7; border-radius: 5px; }
        .btn-filter { background: #27ae60; color: white; padding: 0.7rem 1.5rem; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f8f9fa; }
        .btn-back { display: inline-block; background: #95a5a6; color: white; padding: 0.7rem 1.5rem; border-radius: 5px; text-decoration: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/staff/dashboard">Dashboard</a>
        <a href="/staff/coaches">Danh Sach Xe</a>
        <a href="/staff/routes">Tuyen Duong</a>
        <a href="/staff/trips">Chuyen Xe</a>
        <a href="/staff/tickets/search">Tra Cuu Ve</a>
    </nav>
    
    <div class="container">
        <a href="/staff/dashboard" class="btn-back"> Quay Lai</a>
        <h2>Danh Sach Chuyen Xe</h2>
        
        <form class="filter-form" action="/staff/trips" method="get">
            <div class="form-group">
                <label>Tuyen Duong</label>
                <select name="routeId">
                    <option value="">-- Tat ca --</option>
                    <option th:each="route : ${routes}" 
                            th:value="${route.id}" 
                            th:text="${route.departureLocation.name + ' -> ' + route.arrivalLocation.name}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>Ngay Khoi Hanh</label>
                <input type="date" name="date" th:value="${selectedDate}">
            </div>
            <button type="submit" class="btn-filter">Loc</button>
        </form>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tuyen Duong</th>
                    <th>Xe</th>
                    <th>Gio Khoi Hanh</th>
                    <th>Gia Ve</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="trip : ${trips}">
                    <td th:text="${trip.id}"></td>
                    <td th:text="${trip.route.departureLocation.name + ' -> ' + trip.route.arrivalLocation.name}"></td>
                    <td th:text="${trip.coach.plateNumber}"></td>
                    <td th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${trip.priceBase}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
