<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dat Ve Xe Khach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .booking-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 3rem; width: 100%; max-width: 600px; }
        h1 { color: #333; text-align: center; margin-bottom: 2rem; font-size: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        .form-group select, .form-group input { width: 100%; padding: 1rem; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group select:focus, .form-group input:focus { outline: none; border-color: #667eea; }
        .btn-search { width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-search:hover { transform: translateY(-2px); }
        .navbar { position: absolute; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.1); padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; font-weight: 500; }
        .info-text { text-align: center; margin-top: 1.5rem; color: #777; }
        .info-text a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/home">Trang Chu</a>
        <a href="/booking/my-tickets?phone=">Ve Cua Toi</a>
    </nav>
    
    <div class="booking-container">
        <h1>Dat Ve Xe Khach</h1>
        
        <form action="/booking/trips" method="get">
            <div class="form-group">
                <label>Diem Di</label>
                <select name="departureId" required>
                    <option value="">-- Chon diem di --</option>
                    <option th:each="location : ${locations}" 
                            th:value="${location.id}" 
                            th:text="${location.name + ' - ' + location.city}">
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Diem Den</label>
                <select name="arrivalId" required>
                    <option value="">-- Chon diem den --</option>
                    <option th:each="location : ${locations}" 
                            th:value="${location.id}" 
                            th:text="${location.name + ' - ' + location.city}">
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Ngay Khoi Hanh</label>
                <input type="date" name="date" required min="2026-04-16">
            </div>
            
            <button type="submit" class="btn-search">Tim Chuyen Xe</button>
        </form>
        
        <p class="info-text">Da co tai khoan? <a href="/login">Dang nhap</a></p>
    </div>
</body>
</html>
