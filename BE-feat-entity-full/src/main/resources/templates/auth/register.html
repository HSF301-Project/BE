<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        h2 { text-align: center; color: #333; }
        form { background: #f9f9f9; padding: 20px; border-radius: 10px; }
        div { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .login-link { text-align: center; margin-top: 15px; }
        .error { color: red; background: #ffe6e6; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .success { color: green; background: #e6ffe6; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Đăng ký tài khoản</h2>
    
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>

    <form action="/register" method="post">
        <div>
            <label>Họ tên:</label>
            <input type="text" name="fullName" required />
        </div>
        <div>
            <label>Email:</label>
            <input type="email" name="email" required />
        </div>
        <div>
            <label>Số điện thoại:</label>
            <input type="text" name="phone" required />
        </div>
        <div>
            <label>Mật khẩu:</label>
            <input type="password" name="password" required />
        </div>
        <div>
            <label>Xác nhận mật khẩu:</label>
            <input type="password" name="confirmPassword" required />
        </div>
        <button type="submit">Đăng ký</button>
    </form>
    <p class="login-link">Đã có tài khoản? <a href="/login">Đăng nhập ngay</a></p>
</body>
</html>
