<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Basic Choose Seat - Bus Ticket</title>
</head>
<body>
    <h1>CHỌN GHẾ (BASIC)</h1>
    
    <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 20px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <div>
        <p>Chuyến: <span th:text="${trip.departureStation}"></span> -> <span th:text="${trip.arrivalStation}"></span></p>
        <p>Khởi hành: <span th:text="${trip.departureDateTimeLabel}"></span></p>
    </div>

    <form th:action="@{/booking/confirm}" th:object="${bookingForm}" method="post">
        <input type="hidden" name="tripId" th:value="${trip.id}"/>
        
        <h3>Tầng 1 (Dưới)</h3>
        <div th:each="seat : ${lowerDeckSeats}" style="display: inline-block; margin: 10px; text-align: center;">
            <div th:style="${seat.status.name() == 'BOOKED' ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                <input type="checkbox" 
                       th:id="${seat.seatId}" 
                       th:name="selectedSeats" 
                       th:value="${seat.seatId}"
                       th:disabled="${seat.status.name() == 'BOOKED'}"/>
                <label th:for="${seat.seatId}" 
                       th:text="${seat.seatId}" 
                       th:style="${seat.status.name() == 'BOOKED' ? 'color: #ccc; text-decoration: line-through;' : 'font-weight: bold;'}">
                </label>
            </div>
            <br th:if="${seat.aisleAfter}"/>
        </div>

        <h3>Tầng 2 (Trên)</h3>
        <div th:each="seat : ${upperDeckSeats}" style="display: inline-block; margin: 10px; text-align: center;">
            <div th:style="${seat.status.name() == 'BOOKED' ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                <input type="checkbox" 
                       th:id="${seat.seatId}" 
                       th:name="selectedSeats" 
                       th:value="${seat.seatId}"
                       th:disabled="${seat.status.name() == 'BOOKED'}"/>
                <label th:for="${seat.seatId}" 
                       th:text="${seat.seatId}" 
                       th:style="${seat.status.name() == 'BOOKED' ? 'color: #ccc; text-decoration: line-through;' : 'font-weight: bold;'}">
                </label>
            </div>
            <br th:if="${seat.aisleAfter}"/>
        </div>

        <hr>
        <h3>Thông tin hành khách</h3>
        <div id="passenger-forms-container">
            <!-- JavaScript will render passenger forms here -->
            <p id="no-seat-selected-msg">Vui lòng chọn ít nhất một ghế để nhập thông tin.</p>
        </div>

        <button type="submit" id="submit-btn" disabled>Tiếp tục thanh toán</button>
    </form>

    <script>
        const container = document.getElementById('passenger-forms-container');
        const noSeatMsg = document.getElementById('no-seat-selected-msg');
        const submitBtn = document.getElementById('submit-btn');

        function updatePassengerForms() {
            const selectedCheckboxes = document.querySelectorAll('input[name="selectedSeats"]:checked');
            const selectedSeats = Array.from(selectedCheckboxes).map(cb => cb.value);
            
            // Clear current forms except message
            container.innerHTML = '';
            
            if (selectedSeats.length === 0) {
                container.appendChild(noSeatMsg);
                submitBtn.disabled = true;
                return;
            }

            submitBtn.disabled = false;
            
            selectedSeats.forEach((seatId, index) => {
                const formGroup = document.createElement('div');
                formGroup.style.marginBottom = '15px';
                formGroup.style.padding = '10px';
                formGroup.style.border = '1px solid #ddd';
                
                formGroup.innerHTML = `
                    <strong>Hành khách cho ghế ${seatId}:</strong><br>
                    <label>Tên hành khách:</label>
                    <input type="text" name="passengers[${index}].fullName" placeholder="Nhập tên hành khách" required style="margin-left: 10px;"/>
                    <input type="hidden" name="passengers[${index}].seatId" value="${seatId}"/>
                `;
                container.appendChild(formGroup);
            });
        }

        document.querySelectorAll('input[name="selectedSeats"]').forEach(cb => {
            cb.addEventListener('change', updatePassengerForms);
        });
    </script>
</body>
</html>
