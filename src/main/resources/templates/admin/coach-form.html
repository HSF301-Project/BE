<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: admin-head(${title})}"></head>

<body class="bg-surface min-h-screen text-ink antialiased">
    <aside th:replace="~{admin/fragments/layout :: admin-sidebar('coaches')}"></aside>
    <header th:replace="~{admin/fragments/layout :: admin-topnav(${title})}"></header>

    <main class="ml-60 pt-14 min-h-screen">
        <div class="px-8 py-7 max-w-xl mx-auto">
            <div class="mb-10 text-center">
                <a th:href="@{/admin/coaches}"
                    class="inline-flex items-center gap-2 text-xs font-black text-slate-400 hover:text-blue-700 transition-colors mb-6 uppercase tracking-widest">
                    <span class="ms text-sm">arrow_back</span> Quay lại danh sách
                </a>
                <h1 class="text-5xl font-black tracking-tight text-blue-900" th:text="${title}">Thiết lập phương tiện
                </h1>
            </div>

            <section class="bg-white p-10 rounded-[3rem] shadow-xl shadow-blue-900/5 border border-slate-100">
                <form th:action="${isEdit} ? @{/admin/coaches/update/{id}(id=${coachId})} : @{/admin/coaches/save}"
                    th:object="${coachDTO}" method="post" class="space-y-8">

                    <div th:if="${errorMessage}"
                        class="p-6 bg-red-50 text-red-600 rounded-2xl font-black border border-red-100"
                        th:text="${errorMessage}"></div>

                    <div>
                        <label
                            class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 ml-2">Số
                            đăng ký (Biển số)</label>
                        <input type="text" th:field="*{plateNumber}"
                            class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-700 focus:bg-white focus:ring-0 font-mono font-black text-blue-900 transition-all"
                            placeholder="29A-123.45" />
                        <p th:if="${#fields.hasErrors('plateNumber')}" th:errors="*{plateNumber}"
                            class="mt-2 text-xs text-red-500 font-bold ml-2"></p>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 ml-2">Phân hạng xe</label>
                        <div class="relative">
                            <select th:field="*{coachTypeId}" required
                                class="appearance-none w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-brand-600 focus:bg-white focus:ring-0 font-black text-ink transition-all cursor-pointer">
                                <option value="" th:selected="${coachDTO.coachTypeId == null}">-- Chọn phân loại xe --</option>
                                <option th:each="type : ${coachTypes}" th:value="${type.id}" th:text="${type.name}"></option>
                            </select>
                            <span class="ms absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                        </div>
                        <p th:if="${#fields.hasErrors('coachTypeId')}" th:errors="*{coachTypeId}" class="mt-2 text-xs text-red-500 font-bold ml-2"></p>
                    </div>

                    <div>
                        <label
                            class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 ml-2">Sức
                            chứa tối đa</label>
                        <input type="number" th:field="*{totalSeats}"
                            class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-700 focus:bg-white focus:ring-0 font-black text-blue-900 transition-all"
                            placeholder="Nhập số lượng ghế..." />
                        <p th:if="${#fields.hasErrors('totalSeats')}" th:errors="*{totalSeats}"
                            class="mt-2 text-xs text-red-500 font-bold ml-2"></p>
                    </div>



                    <div class="pt-6">
                        <button type="submit"
                            class="w-full py-5 bg-blue-700 text-white rounded-2xl font-black shadow-xl shadow-blue-700/20 hover:scale-[0.98] transition-transform uppercase tracking-widest">
                            Lưu cấu hình phương tiện
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </main>

</body>

</html>
