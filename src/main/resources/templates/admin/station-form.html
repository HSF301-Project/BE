<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: admin-head(${location.id != null} ? 'Cập nhật Địa điểm' : 'Thêm Địa điểm')}"></head>
<body class="bg-surface min-h-screen text-ink antialiased">

<aside th:replace="~{admin/fragments/layout :: admin-sidebar('infrastructure')}"></aside>
<header th:replace="~{admin/fragments/layout :: admin-topnav(${location.id != null} ? 'Cập nhật Địa điểm' : 'Thêm Địa điểm')}"></header>

<main class="ml-60 pt-14 min-h-screen">
    <div class="px-8 py-7 max-w-screen-xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-extrabold text-ink" th:text="${location.id != null} ? 'Cập nhật Địa điểm' : 'Tạo Địa điểm'">Tạo Địa điểm</h1>
                <p class="text-sm text-ink-muted mt-1">Định nghĩa trạm dừng, bến bãi hoặc điểm trung chuyển vào hệ thống hạ tầng.</p>
            </div>
            <a th:href="@{/admin/infrastructure(tab='stations')}" class="text-sm font-semibold text-ink-muted hover:text-brand-600">← Quay lại Hạ tầng</a>
        </div>

        <form th:action="@{/admin/infrastructure/stations/save}" th:object="${location}" method="post" class="space-y-6">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}" />

            <section class="bg-surface-card rounded-2xl border border-surface-border p-6 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-ink-faint mb-2">Tên địa điểm <span class="text-red-500">*</span></label>
                        <input th:field="*{name}" required placeholder="Ví dụ: Bến xe Miền Đông, Trạm An Sương..." 
                               th:classappend="${#fields.hasErrors('name')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-surface-border focus:ring-brand-500 focus:border-brand-500'"
                               class="w-full rounded-xl bg-white transition-all"/>
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-xs font-bold text-red-500"></p>
                    </div>
                    <div class="relative" id="cityContainer">
                        <label class="block text-xs font-black uppercase tracking-widest text-ink-faint mb-2">Thành phố/Tỉnh <span class="text-red-500">*</span></label>
                        <input type="hidden" th:field="*{city}" id="cityInput">
                        <div class="relative group">
                            <input type="text" id="citySearch" 
                                   autocomplete="off"
                                   placeholder="Tìm thành phố/tỉnh..." 
                                   th:classappend="${#fields.hasErrors('city')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-surface-border focus:ring-brand-500 focus:border-brand-500'"
                                   class="w-full rounded-xl bg-white pr-10 transition-all"
                                   onclick="showCityDropdown()"
                                   onfocus="showCityDropdown()"
                                   oninput="filterCityDropdown()">
                            <span class="ms absolute right-3 top-1/2 -translate-y-1/2 text-ink-faint pointer-events-none group-focus-within:text-brand-600">search</span>
                        </div>
                        <p th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="mt-1 text-xs font-bold text-red-500"></p>
                        <div id="cityDropdown" class="absolute z-50 w-full mt-1 bg-white border border-surface-border rounded-xl shadow-xl max-h-64 overflow-y-auto hidden divide-y divide-surface-border">
                            <!-- JS will populate this or we can use Thymeleaf if we pass the list from controller -->
                            <!-- For now, let's hardcode the list in JS for simplicity as it's static data -->
                            <div class="no-results px-4 py-8 text-center text-ink-faint hidden">
                                <span class="ms text-4xl block mb-2">search_off</span>
                                <p class="text-xs font-bold">Không tìm thấy tỉnh thành nào</p>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-ink-faint mb-2">Loại địa điểm</label>
                        <select th:field="*{locationType}" class="w-full rounded-xl border-surface-border bg-white">
                            <option value="TERMINAL">Bến chính (Terminal)</option>
                            <option value="STOP">Trạm dừng (Stop)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-ink-faint mb-2">Địa chỉ chi tiết <span class="text-red-500">*</span></label>
                        <input th:field="*{address}" required placeholder="Số nhà, đường, phường/xã..." 
                               th:classappend="${#fields.hasErrors('address')} ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-surface-border focus:ring-brand-500 focus:border-brand-500'"
                               class="w-full rounded-xl bg-white transition-all"/>
                        <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="mt-1 text-xs font-bold text-red-500"></p>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-black uppercase tracking-widest text-ink-faint mb-2">Ghi chú (Tùy chọn)</label>
                        <textarea th:field="*{notes}" rows="3" placeholder="Giờ hoạt động, số điện thoại liên hệ bến bãi..." class="w-full rounded-xl border-surface-border bg-white"></textarea>
                    </div>
                </div>
            </section>

            <div class="flex justify-end gap-3 mt-6">
                <a th:href="@{/admin/infrastructure(tab='stations')}" class="px-5 py-2.5 rounded-xl border border-surface-border text-sm font-bold text-ink-muted hover:bg-surface-hover">Huỷ</a>
                <button type="submit" class="px-6 py-2.5 rounded-xl bg-brand-700 text-white text-sm font-bold shadow-sm hover:opacity-95">
                    Lưu địa điểm
                </button>
            </div>
        </form>
    </div>
</main>

<script th:inline="javascript">
    const provinces = [
        "An Giang", "Bắc Ninh", "Cà Mau", "Cao Bằng", "TP. Cần Thơ", "TP. Đà Nẵng", "Đắk Lắk", "Điện Biên", "Đồng Nai", "Đồng Tháp", "Gia Lai", "TP. Hà Nội", "Hà Tĩnh", "TP. Hải Phòng", "TP. Hồ Chí Minh", "TP. Huế", "Hưng Yên", "Khánh Hoà", "Lai Châu", "Lạng Sơn", "Lào Cai", "Lâm Đồng", "Nghệ An", "Ninh Bình", "Phú Thọ", "Quảng Ngãi", "Quảng Ninh", "Quảng Trị", "Sơn La", "Tây Ninh", "Thái Nguyên", "Thanh Hóa", "Tuyên Quang", "Vĩnh Long"
    ];

    function initCityDropdown() {
        const dropdown = document.getElementById('cityDropdown');
        const noResults = dropdown.querySelector('.no-results');
        
        provinces.forEach(city => {
            const div = document.createElement('div');
            div.className = 'px-4 py-3 hover:bg-brand-50 cursor-pointer transition-colors flex items-center gap-3 city-item';
            div.setAttribute('data-city', city);
            div.innerHTML = `
                <span class="ms text-brand-600 text-[20px]">location_city</span>
                <div class="text-sm font-bold text-ink">${city}</div>
            `;
            div.onclick = () => selectCity(city);
            dropdown.insertBefore(div, noResults);
        });
    }

    function showCityDropdown() {
        document.getElementById('cityDropdown').classList.remove('hidden');
        filterCityDropdown();
    }

    function filterCityDropdown() {
        const search = document.getElementById('citySearch').value.toLowerCase().trim();
        const dropdown = document.getElementById('cityDropdown');
        
        // Ensure dropdown is visible when typing
        dropdown.classList.remove('hidden');
        
        const items = dropdown.querySelectorAll('.city-item');
        let hasVisible = false;

        items.forEach(item => {
            const city = item.getAttribute('data-city').toLowerCase();
            if (city.includes(search)) {
                item.classList.remove('hidden');
                hasVisible = true;
            } else {
                item.classList.add('hidden');
            }
        });

        dropdown.querySelector('.no-results').classList.toggle('hidden', hasVisible);
    }

    function selectCity(city) {
        document.getElementById('cityInput').value = city;
        document.getElementById('citySearch').value = city;
        document.getElementById('cityDropdown').classList.add('hidden');
    }

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
        if (!document.getElementById('cityContainer').contains(e.target)) {
            document.getElementById('cityDropdown').classList.add('hidden');
        }
    });

    // Initialize labels for edit mode
    window.addEventListener('DOMContentLoaded', () => {
        initCityDropdown();
        const currentCity = document.getElementById('cityInput').value;
        if (currentCity) {
            document.getElementById('citySearch').value = currentCity;
        }
    });
</script>
</body>
</html>
