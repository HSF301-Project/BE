<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: admin-head('Bảng điều khiển')}"></head>
<body class="bg-surface min-h-screen text-ink antialiased">

<aside th:replace="~{admin/fragments/layout :: admin-sidebar('dashboard')}"></aside>
<header th:replace="~{admin/fragments/layout :: admin-topnav('Bảng điều khiển')}"></header>


<main class="ml-60 pt-14 min-h-screen">
    <div class="px-8 py-7 max-w-screen-2xl mx-auto">

        <!-- Page Header -->
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-ink">Xin chào,
                <span th:text="${adminUser != null ? adminUser.fullName : 'Admin'}">Admin</span> 👋
            </h1>
            <p class="text-sm text-ink-muted mt-1">Chào mừng trở lại trung tâm điều hành Transit Admin.</p>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
            <div class="stat-card flex gap-4 items-start">
                <div class="p-2.5 bg-brand-50 rounded-xl text-brand-700">
                    <span class="ms text-[28px]">rv_hookup</span>
                </div>
                <div>
                    <p class="text-xs font-bold text-ink-faint uppercase tracking-widest mb-1">Tổng đội xe</p>
                    <p class="text-2xl font-bold text-ink" th:text="${totalCoaches + ' Phương tiện'}">—</p>
                    <a th:href="@{/admin/coaches}" class="text-xs text-brand-600 font-semibold hover:underline mt-1 inline-block">Quản lý →</a>
                </div>
            </div>
            <div class="stat-card flex gap-4 items-start">
                <div class="p-2.5 bg-emerald-50 rounded-xl text-emerald-700">
                    <span class="ms text-[28px]">confirmation_number</span>
                </div>
                <div>
                    <p class="text-xs font-bold text-ink-faint uppercase tracking-widest mb-1">Tỉ lệ thành công</p>
                    <p class="text-2xl font-bold text-ink" th:text="${successRate + '%'}">98%</p>
                </div>
            </div>
            <div class="stat-card flex gap-4 items-start">
                <div class="p-2.5 bg-orange-50 rounded-xl text-orange-700">
                    <span class="ms text-[28px]">payments</span>
                </div>
                <div>
                    <p class="text-xs font-bold text-ink-faint uppercase tracking-widest mb-1">Doanh thu ngày</p>
                    <p class="text-2xl font-bold text-ink" th:text="${todayRevenue}">0đ</p>
                </div>
            </div>
        </div>

        <!-- Quick access -->
        <div class="bg-surface-card border border-surface-border rounded-xl p-6">
            <h2 class="text-base font-bold text-ink mb-4">Truy cập nhanh</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <a th:href="@{/admin/coaches/create}"
                   class="p-4 bg-surface rounded-xl border border-surface-border hover:bg-brand-50 hover:border-brand-200 transition-colors group text-center">
                    <span class="ms text-[28px] text-ink-faint group-hover:text-brand-700 mb-2 block">add_circle</span>
                    <p class="font-semibold text-sm text-ink-muted group-hover:text-ink">Thêm xe mới</p>
                </a>
                <a th:href="@{/admin/trips}"
                   class="p-4 bg-surface rounded-xl border border-surface-border hover:bg-brand-50 hover:border-brand-200 transition-colors group text-center">
                    <span class="ms text-[28px] text-ink-faint group-hover:text-brand-700 mb-2 block">departure_board</span>
                    <p class="font-semibold text-sm text-ink-muted group-hover:text-ink">Lịch trình</p>
                </a>
                <a th:href="@{/admin/infrastructure}"
                   class="p-4 bg-surface rounded-xl border border-surface-border hover:bg-brand-50 hover:border-brand-200 transition-colors group text-center">
                    <span class="ms text-[28px] text-ink-faint group-hover:text-brand-700 mb-2 block">garage</span>
                    <p class="font-semibold text-sm text-ink-muted group-hover:text-ink">Hạ tầng</p>
                </a>
                <a th:href="@{/admin/payments}"
                   class="p-4 bg-surface rounded-xl border border-surface-border hover:bg-brand-50 hover:border-brand-200 transition-colors group text-center">
                    <span class="ms text-[28px] text-ink-faint group-hover:text-brand-700 mb-2 block">payments</span>
                    <p class="font-semibold text-sm text-ink-muted group-hover:text-ink">Thanh toán</p>
                </a>
            </div>
        </div>

    </div>
</main>

</body>
</html>
