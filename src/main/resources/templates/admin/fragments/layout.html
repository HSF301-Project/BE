<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<!-- ================================================================
     FRAGMENT: admin-head
     Usage: <head th:replace="~{Admin/fragments/layout :: admin-head(title='Page Title')}">
     ================================================================ -->
<head th:fragment="admin-head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Transit Admin'">Transit Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['ui-monospace', 'monospace']
                    },
                    colors: {
                        brand:   { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        primary: { DEFAULT: '#1d4ed8', container: '#dbeafe', fixed: '#eff6ff' },
                        secondary: { DEFAULT: '#64748b', fixed: '#f1f5f9' },
                        tertiary: { DEFAULT: '#059669', fixed: '#ecfdf5' },
                        surface: { 
                            DEFAULT:'#f8fafc', 
                            card:'#ffffff', 
                            border:'#e2e8f0', 
                            hover:'#f1f5f9',
                            container: {
                                lowest: '#ffffff',
                                low: '#f8fafc',
                                DEFAULT: '#f1f5f9',
                                high: '#e2e8f0',
                                highest: '#cbd5e1'
                            },
                            bright: '#ffffff',
                            dim: '#f1f5f9'
                        },
                        ink: { DEFAULT:'#0f172a', muted:'#64748b', faint:'#94a3b8' },
                        'on-surface': { DEFAULT: '#0f172a', variant: '#64748b' },
                        'on-primary-fixed': '#1d4ed8',
                        'on-secondary-fixed': '#475569',
                        'on-tertiary-fixed': '#065f46',
                        'primary-fixed': '#60a5fa'
                    },
                    boxShadow: { card:'0 1px 3px 0 rgb(0 0 0 / .06), 0 1px 2px -1px rgb(0 0 0 / .04)' }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .ms { font-family: 'Material Symbols Rounded'; font-variation-settings: 'FILL' 0,'wght' 450,'GRAD' 0,'opsz' 24; line-height:1; display:inline-block; user-select:none; }
        .ms-fill { font-variation-settings: 'FILL' 1,'wght' 450,'GRAD' 0,'opsz' 24; }

        /* Sidebar nav */
        .nav-link { display:flex; align-items:center; gap:.6rem; padding:.55rem .75rem; border-radius:.65rem; font-size:.875rem; color:#64748b; font-weight:600; transition:.12s; text-decoration:none; }
        .nav-link:hover { background:#f1f5f9; color:#0f172a; }
        .nav-link.active { background:#eff6ff; color:#1d4ed8; }

        /* Utility */
        .stat-card { background:#fff; border:1px solid #e2e8f0; border-radius:1rem; padding:1.25rem; }
        .badge { display:inline-flex; align-items:center; gap:.35rem; padding:.25rem .6rem; border-radius:9999px; font-size:.75rem; font-weight:700; }
        .btn-icon { padding:.4rem; border-radius:.55rem; color:#94a3b8; transition:.12s; background:transparent; border:none; cursor:pointer; }
        .btn-icon:hover { background:#f1f5f9; color:#0f172a; }

        /* Table */
        .th { padding:.75rem 1rem; text-align:left; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:#94a3b8; }
        .td { padding:.85rem 1rem; font-size:.9rem; }
        thead tr { background:#f8fafc; }
        tbody tr { border-top:1px solid #f1f5f9; transition:background .12s; }
        tbody tr:hover { background:#fafbff; }

        /* Status pills */
        .pill-status { display:inline-flex; align-items:center; gap:.45rem; padding:.25rem .65rem; border-radius:9999px; font-size:.75rem; font-weight:800; }
        .dot { width:.38rem; height:.38rem; border-radius:9999px; flex-shrink:0; }

        /* Tab filters */
        .tab-filter { padding-bottom:.75rem; font-size:.875rem; font-weight:700; color:#94a3b8; border-bottom:2px solid transparent; transition:.12s; white-space:nowrap; text-decoration:none; }
        .tab-filter:hover { color:#0f172a; }
        .tab-filter.active { color:#1d4ed8; border-bottom-color:#2563eb; }

        /* Scrollbar */
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:9999px; }
        ::-webkit-scrollbar-thumb:hover { background:#cbd5e1; }
    </style>
</head>

<!-- ================================================================
     FRAGMENT: admin-sidebar
     Usage: <th:block th:replace="~{Admin/fragments/layout :: admin-sidebar(activePage='trips')}"/>
     activePage values: dashboard | trips | infrastructure | coaches | payments | reports | settings
     ================================================================ -->
<aside th:fragment="admin-sidebar(activePage)" class="fixed inset-y-0 left-0 w-60 bg-surface-card border-r border-surface-border flex flex-col z-40">

    <!-- Logo -->
    <div class="px-5 py-5 border-b border-surface-border flex-shrink-0">
        <a th:href="@{/admin}" class="flex items-center gap-2 group">
            <div class="w-7 h-7 rounded-lg bg-brand-700 flex items-center justify-center flex-shrink-0">
                <span class="ms text-white text-[16px]">directions_bus</span>
            </div>
            <span class="font-bold text-ink text-sm group-hover:text-brand-700 transition-colors">Transit Admin</span>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <p class="px-3 pb-2 text-[10px] font-bold uppercase tracking-widest text-ink-faint">Điều hành</p>

        <a th:href="@{/admin/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">dashboard</span>
            Bảng điều khiển
        </a>

        <a th:href="@{/admin/trips}"
           th:classappend="${activePage == 'trips'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">departure_board</span>
            Chuyến đi
        </a>

        <a th:href="@{/admin/coaches}"
           th:classappend="${activePage == 'coaches'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">rv_hookup</span>
            Quản lý Xe
        </a>

        <a th:href="@{/admin/infrastructure}"
           th:classappend="${activePage == 'infrastructure'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">garage</span>
            Hạ tầng
        </a>

        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">badge</span>
            Quản lý Nhân viên
        </a>

        <a th:href="@{/admin/customers}"
           th:classappend="${activePage == 'customers'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">group</span>
            Quản lý Khách hàng
        </a>

        <p class="px-3 pt-4 pb-2 text-[10px] font-bold uppercase tracking-widest text-ink-faint">Tài chính</p>

        <a th:href="@{/admin/payments}"
           th:classappend="${activePage == 'payments'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">payments</span>
            Thanh toán
        </a>

        <a th:href="@{/admin/reports}"
           th:classappend="${activePage == 'reports'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">bar_chart_4_bars</span>
            Báo cáo
        </a>
    </nav>

    <!-- Footer: settings + user -->
    <div class="px-3 pb-4 border-t border-surface-border pt-3 space-y-0.5 flex-shrink-0">
        <a th:href="@{/admin/settings}"
           th:classappend="${activePage == 'settings'} ? 'active' : ''"
           class="nav-link">
            <span class="ms text-[20px]">settings</span>
            Cài đặt
        </a>

        <div class="flex items-center gap-3 px-3 pt-3 mt-2 border-t border-surface-border">
            <div class="relative">
                <img th:src="@{/images/default-admin.png}"
                     class="w-9 h-9 rounded-xl object-cover border border-surface-border shadow-sm"
                     th:alt="${adminUser != null ? adminUser.fullName : 'Admin'}"/>
                <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-500 border-2 border-white rounded-full"></div>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-ink truncate"
                   th:text="${adminUser != null ? adminUser.fullName : 'Admin'}">Admin</p>
                <p class="text-[10px] font-bold text-ink-faint uppercase tracking-tight"
                   th:text="${adminUser != null ? adminUser.role : 'ADMIN'}">ADMIN</p>
            </div>
            <form th:action="@{/logout}" method="post" class="flex-shrink-0">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-icon hover:text-red-500" title="Đăng xuất">
                    <span class="ms text-[18px]">logout</span>
                </button>
            </form>
        </div>
    </div>
</aside>

<!-- ================================================================
     FRAGMENT: admin-topnav
     Usage: <th:block th:replace="~{admin/fragments/layout :: admin-topnav(pageTitle='Tiêu đề trang')}"/>
     ================================================================ -->
<header th:fragment="admin-topnav(pageTitle)"
        class="fixed top-0 left-60 right-0 h-14 bg-surface-card/90 backdrop-blur border-b border-surface-border flex items-center justify-between px-6 z-30">
    <span class="text-sm font-semibold text-ink-muted" th:text="${pageTitle}">Transit Admin</span>
    <div class="flex items-center gap-3">
        <button class="btn-icon relative" title="Thông báo">
            <span class="ms text-[22px]">notifications</span>
            <span th:if="${hasAlerts}" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <button class="btn-icon" title="Tài khoản">
            <span class="ms text-[22px]">account_circle</span>
        </button>
    </div>
</header>

</html>
