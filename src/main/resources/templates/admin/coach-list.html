<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{Admin/fragments/layout :: admin-head('Quản lý Đội xe')}"></head>

<body class="bg-surface min-h-screen text-ink antialiased">

    <aside th:replace="~{Admin/fragments/layout :: admin-sidebar('coaches')}"></aside>
    <header th:replace="~{Admin/fragments/layout :: admin-topnav('Quản lý Đội xe')}"></header>

    <main class="ml-60 pt-14 min-h-screen">
        <div class="px-8 py-7 max-w-screen-2xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h1 class="text-5xl font-black tracking-tight text-blue-900 mb-2">Quản lý Đội xe</h1>
                    <p class="text-slate-500 font-medium">Toàn bộ phương tiện vận tải siêu sang của hệ thống.</p>
                </div>
                <a th:href="@{/admin/coaches/create}"
                    class="btn-primary-gradient px-8 py-4 text-white rounded-2xl font-black flex items-center gap-2 hover:scale-[0.98] transition-transform">
                    <span class="material-symbols-outlined">add</span> THÊM XE MỚI
                </a>
            </div>

            <div th:if="${successMessage}"
                class="mb-8 p-6 bg-emerald-50 text-emerald-700 rounded-3xl font-black border border-emerald-100 shadow-sm"
                th:text="${successMessage}"></div>

            <section class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100">
                <table class="w-full text-left">
                    <thead>
                        <tr
                            class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] border-b border-slate-100">
                            <th class="px-8 py-6">Biển số</th>
                            <th class="px-8 py-6">Dòng xe</th>
                            <th class="px-8 py-6">Cấu hình ghế</th>
                            <th class="px-8 py-6 text-right">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr th:each="coach : ${coaches}" class="table-row-hover transition-all cursor-pointer group"
                            th:onclick="|window.location.href='@{/admin/coaches/detail/{id}(id=${coach.id})}'|">
                            <td class="px-8 py-7">
                                <span
                                    class="font-mono font-black text-blue-900 bg-blue-50 px-3 py-1 rounded-lg group-hover:bg-blue-700 group-hover:text-white transition-colors"
                                    th:text="${coach.plateNumber}">29A-12345</span>
                            </td>
                            <td class="px-8 py-7">
                                <span class="status-badge bg-slate-100 text-slate-600 uppercase tracking-tighter"
                                    th:text="${coach.coachType}">Limousine</span>
                            </td>
                            <td class="px-8 py-7 font-black text-slate-600" th:text="${coach.totalSeats + ' Chỗ ngồi'}">
                                34 Chỗ</td>
                            <td class="px-8 py-7 text-right flex justify-end gap-3" onclick="event.stopPropagation()">
                                <a th:href="@{/admin/coaches/edit/{id}(id=${coach.id})}"
                                    class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-blue-100 hover:text-blue-700 transition-all">
                                    <span class="material-symbols-outlined text-[20px]">edit</span>
                                </a>
                                <form th:action="@{/admin/coaches/delete/{id}(id=${coach.id})}" method="post"
                                    onsubmit="return confirm('Xóa xe này khỏi hệ thống?')">
                                    <button type="submit"
                                        class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-red-100 hover:text-red-600 transition-all">
                                        <span class="material-symbols-outlined text-[20px]">delete</span>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

</body>

</html>
