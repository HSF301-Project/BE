<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Sơ đồ hành khách</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
    </style>
</head>
<body class="admin-main text-on-surface antialiased">

<aside class="admin-sidebar fixed left-0 top-0 h-full z-40 flex flex-col w-64 bg-slate-50 font-semibold tracking-tight shadow-lg">
    <div class="p-6 flex flex-col gap-1 border-b border-slate-200">
        <a th:href="@{/admin/dashboard}" class="text-xl font-black tracking-tighter text-blue-900">PREMIUM TRANSIT</a>
    </div>
    <nav class="flex-1 px-4 py-8 space-y-2">
        <a th:href="@{/admin/coaches}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-700 text-white shadow-md shadow-blue-200 transition-all">
            <span class="material-symbols-outlined">rv_hookup</span><span>Quản lý Xe</span>
        </a>
    </nav>
</aside>

<main class="pl-72 pr-8 pt-12 pb-12 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto" th:object="${trip}">
        <div class="mb-10">
            <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-xs font-black text-slate-400 hover:text-blue-700 transition-colors uppercase tracking-widest mb-6">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Quay lại hồ sơ xe
            </a>
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-black tracking-tight text-blue-900 mb-2" th:text="*{routeName}">Hà Nội - Sài Gòn</h1>
                    <div class="flex items-center gap-4 text-slate-500 font-semibold">
                         <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">calendar_month</span> <span th:text="*{departureTime}"></span></div>
                         <div class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">person</span> <span th:text="'Tài xế: ' + *{driverName}"></span></div>
                    </div>
                </div>
                <div class="bg-blue-50 px-6 py-3 rounded-2xl border border-blue-100">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest block">Biển số xe</span>
                    <span class="text-xl font-black text-blue-900" th:text="*{coachPlate}">51B-12345</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Seat Map -->
            <div class="space-y-8">
                <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-xl font-black text-blue-900 italic uppercase tracking-tighter">Sơ đồ vị trí</h2>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2">
                                 <div class="w-3 h-3 rounded-full bg-slate-100 border border-slate-200"></div>
                                 <span class="text-[10px] font-black text-slate-400 uppercase">Trống</span>
                            </div>
                            <div class="flex items-center gap-2">
                                 <div class="w-3 h-3 rounded-full bg-blue-600 shadow-sm shadow-blue-200"></div>
                                 <span class="text-[10px] font-black text-slate-400 uppercase">Có khách</span>
                            </div>
                        </div>
                    </div>

                    <!-- Layout Simulation -->
                    <div class="relative max-w-[300px] mx-auto p-8 bg-slate-50 rounded-[2.5rem] border-4 border-slate-100">
                        <!-- Driver area -->
                        <div class="absolute top-4 right-4 w-10 h-10 bg-slate-200 rounded-lg flex items-center justify-center text-slate-400">
                            <span class="material-symbols-outlined">adjust</span>
                        </div>

                        <div class="pt-16 seat-grid">
                            <div th:each="seat : *{seats}" 
                                 th:class="${seat.occupied ? 'relative group p-2 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200 border-2 border-blue-400 flex items-center justify-center font-black cursor-help' : 'p-2 bg-white text-slate-400 rounded-xl border border-slate-200 flex items-center justify-center font-black transition-all hover:bg-slate-100'}">
                                <span class="text-xs" th:text="${seat.seatNumber}"></span>
                                
                                <!-- Hover Tooltip for Admin -->
                                <div th:if="${seat.occupied}" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-48 p-4 bg-slate-900 text-white rounded-2xl text-[10px] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-10 shadow-2xl">
                                    <div class="text-blue-400 font-black mb-1 opacity-50 uppercase tracking-widest">Hành khách</div>
                                    <div class="text-xs font-black mb-2" th:text="${seat.passengerName}">Nguyen Van A</div>
                                    <div class="flex items-center gap-1.5 mb-2">
                                        <span class="material-symbols-outlined text-[10px] text-emerald-400">call</span>
                                        <span class="font-bold" th:text="${seat.passengerPhone}">0901234567</span>
                                    </div>
                                    <div class="pt-2 border-t border-white/10 italic text-white/50 text-[9px]">
                                        Code: <span th:text="${seat.ticketCode}">ABC-123</span>
                                    </div>
                                    <div class="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-900"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detailed List (Secondary) -->
            <div class="bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col">
                <div class="p-8 border-b border-slate-50 bg-slate-50/50">
                    <h2 class="text-xl font-black text-blue-900">Khách trên xe</h2>
                </div>
                <div class="flex-1 overflow-y-auto max-h-[600px] p-6 space-y-4">
                    <div th:each="seat : *{seats}" th:if="${seat.occupied}" class="flex items-center justify-between p-4 bg-blue-50/30 border border-blue-50 rounded-2xl">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-blue-700 text-white rounded-xl flex items-center justify-center font-black text-sm" th:text="${seat.seatNumber}"></div>
                            <div>
                                <p class="text-sm font-black text-blue-900" th:text="${seat.passengerName}"></p>
                                <p class="text-[10px] font-bold text-slate-400" th:text="${seat.passengerPhone}"></p>
                            </div>
                        </div>
                        <div class="text-right">
                             <p class="text-[9px] font-black text-blue-300 uppercase tracking-widest">Mã vé</p>
                             <p class="text-xs font-mono font-black text-blue-700" th:text="${seat.ticketCode}"></p>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(trip.seats.?[occupied])}" class="py-20 text-center">
                        <p class="text-slate-300 italic font-medium">Chưa có khách đặt vé.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
