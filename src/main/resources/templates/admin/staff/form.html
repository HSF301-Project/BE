<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật Staff' : 'Tạo Staff mới'">Staff Form</title>
</head>
<body>
<h2 th:text="${isEdit} ? 'Cập nhật Staff' : 'Tạo Staff mới'"></h2>

<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

<form th:if="${isEdit}"
      th:action="@{/admin/staff/edit/{id}(id=${staffId})}"
      th:object="${staffForm}"
      method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div>
        <label for="email">Email:</label>
        <input id="email" type="email" th:field="*{email}" required>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></p>
    </div>

    <div>
        <label for="fullName">Họ tên:</label>
        <input id="fullName" type="text" th:field="*{fullName}" required>
        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color: red;"></p>
    </div>

    <div>
        <label for="phone">Số điện thoại:</label>
        <input id="phone" type="text" th:field="*{phone}" required>
        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: red;"></p>
    </div>

    <div>
        <label for="passwordEdit">Mật khẩu mới (để trống nếu không đổi):</label>
        <input id="passwordEdit" type="password" th:field="*{password}">
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></p>
    </div>

    <div>
        <label for="status">Trạng thái:</label>
        <select id="status" th:field="*{status}">
            <option value="">-- Chọn trạng thái --</option>
            <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
        </select>
    </div>

    <div>
        <button type="submit">Cập nhật</button>
        <a th:href="@{/admin/staff}">Quay lại</a>
    </div>
</form>

<form th:if="${!isEdit}"
      th:action="@{/admin/staff/create}"
      th:object="${staffForm}"
      method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div>
        <label for="email">Email:</label>
        <input id="email" type="email" th:field="*{email}" required>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></p>
    </div>

    <div>
        <label for="fullName">Họ tên:</label>
        <input id="fullName" type="text" th:field="*{fullName}" required>
        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color: red;"></p>
    </div>

    <div>
        <label for="phone">Số điện thoại:</label>
        <input id="phone" type="text" th:field="*{phone}" required>
        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: red;"></p>
    </div>

    <div>
        <label for="passwordCreate">Mật khẩu:</label>
        <input id="passwordCreate" type="password" th:field="*{password}" required>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></p>
    </div>

    <div>
        <label for="status">Trạng thái:</label>
        <select id="status" th:field="*{status}">
            <option value="">-- Chọn trạng thái --</option>
            <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
        </select>
    </div>

    <div>
        <button type="submit">Tạo mới</button>
        <a th:href="@{/admin/staff}">Quay lại</a>
    </div>
</form>

</body>
</html>
