<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar"
     class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl top-0 sticky z-50 shadow-[0_12px_32px_rgba(26,27,33,0.06)]">
    <div class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">

        <div class="flex items-center gap-8">
            <a th:href="@{/home}" class="text-2xl font-black italic text-blue-900 dark:text-white editorial-heading">
                Premium Transit
            </a>
            <div class="hidden md:flex gap-6">
                <a sec:authorize="!hasAnyRole('STAFF', 'ADMIN')" th:href="@{/booking/my-trips}"
                   class="font-semibold tracking-tight text-slate-500 dark:text-slate-400 hover:text-blue-800 transition-colors"
                   style="font-family:'Plus Jakarta Sans',sans-serif">
                    Chuyến đi của tôi
                </a>

                <a sec:authorize="hasRole('STAFF') and !hasRole('ADMIN')" th:href="@{/staff/booking/trips}"
                   class="font-semibold tracking-tight text-blue-700 hover:text-blue-900 transition-colors"
                   style="font-family:'Plus Jakarta Sans',sans-serif">
                    Chức năng của nhân viên
                </a>

                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}"
                   class="font-semibold tracking-tight text-blue-700 hover:text-blue-900 transition-colors"
                   style="font-family:'Plus Jakarta Sans',sans-serif">
                    Trang quản trị
                </a>
            </div>
        </div>

        <div class="flex items-center gap-4">

            <div sec:authorize="isAuthenticated()" class="relative group">
                <div class="flex items-center gap-3 cursor-pointer py-1 pl-1 pr-4 bg-slate-50 dark:bg-slate-800 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700">

                    <div sec:authorize="hasRole('ADMIN')" class="w-8 h-8 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-800 dark:text-red-500">
                        <span class="material-symbols-outlined text-xl">account_circle</span>
                    </div>

                    <div sec:authorize="hasRole('STAFF') and !hasRole('ADMIN')" class="w-8 h-8 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center text-yellow-600 dark:text-yellow-400">
                        <span class="material-symbols-outlined text-xl">account_circle</span>
                    </div>

                    <div sec:authorize="!hasAnyRole('ADMIN', 'STAFF')" class="w-8 h-8 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400">
                        <span class="material-symbols-outlined text-xl">account_circle</span>
                    </div>

                    <span class="material-symbols-outlined text-sm text-slate-400 group-hover:rotate-180 transition-transform duration-300">expand_more</span>
                </div>

                <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 origin-top-right z-50 overflow-hidden">
                    <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                        <span class="material-symbols-outlined text-lg">person</span>
                        Tài khoản
                    </a>
                    <div class="h-px w-full bg-slate-100 dark:bg-slate-700"></div>
                    <form th:action="@{/logout}" method="post" class="w-full">
                        <button type="submit" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors text-left">
                            <span class="material-symbols-outlined text-lg">logout</span>
                            Đăng xuất
                        </button>
                    </form>
                </div>
            </div>

            <div sec:authorize="!isAuthenticated()" class="flex items-center gap-2">
                <a th:href="@{/login}"
                   class="px-4 py-2 text-sm font-semibold text-blue-900 dark:text-blue-400 hover:underline">
                    Đăng nhập
                </a>
                <a th:href="@{/register}"
                   class="px-4 py-2 bg-blue-900 text-white text-sm font-bold rounded-full hover:opacity-90 transition-all shadow-md">
                    Đăng ký
                </a>
            </div>

        </div>
    </div>
</nav>

</body>
</html>
