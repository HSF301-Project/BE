<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Fragment: head-common
    Usage: th:replace="~{fragments/head-common :: head-common(title='Page Title')}"
    Includes: charset, viewport, Google Fonts, Material Symbols, Tailwind CDN, common CSS
-->
<th:block th:fragment="head-common(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Premium Transit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

    <!-- Material Symbols icon font -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <!-- Tailwind CSS (CDN with plugins) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Shared Tailwind design-token config -->
    <script th:src="@{/js/tailwind-config.js}"></script>

    <!-- Shared base CSS (material symbols, typography, utilities) -->
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
</th:block>

</body>
</html>
