<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="staff-sidebar(activeTab)"
       class="fixed left-0 top-0 h-full flex flex-col pt-4 pb-8 bg-slate-50 dark:bg-slate-950 w-64 border-r border-slate-200 dark:border-slate-800 font-sans text-sm font-medium z-50">

    <div class="px-6 mb-8 flex justify-between items-start">
        <div>
            <div class="text-lg font-black text-blue-800 dark:text-blue-300">Staff Portal</div>
            <div class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">Staff Access</div>
        </div>
        <a th:href="@{/}" class="w-8 h-8 rounded-lg bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition-colors shadow-sm" title="Về trang chủ">
            <span class="material-symbols-outlined text-[20px]">home</span>
        </a>
    </div>

    <nav class="flex-1 space-y-1">
        <a th:href="@{/staff/booking/trips}" sec:authorize="hasRole('ROLE_STAFF')"
           th:class="${activeTab == 'trips'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">calendar_today</span>
            <span>Lịch trình</span>
        </a>

        <a th:href="@{/staff/schedule}"
           th:class="${activeTab == 'schedule'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">event_note</span>
            <span>Lịch trình hôm nay</span>
        </a>
    </nav>

    <div class="pt-4 border-t border-slate-200 dark:border-slate-800 space-y-1">
        <form th:action="@{/logout}" method="post" class="mx-2">
            <button type="submit"
                    class="w-full flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all rounded-lg">
                <span class="material-symbols-outlined">logout</span>
                <span>Đăng xuất</span>
            </button>
        </form>
    </div>
</aside>

</body>
</html>
