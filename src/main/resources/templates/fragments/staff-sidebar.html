<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Fragment: staff-sidebar
    Usage: th:replace="~{fragments/staff-sidebar :: staff-sidebar(activeTab='trips')}"
    activeTab values: 'trips' | 'checkin' | 'schedule' | 'passengers'
-->
<aside th:fragment="staff-sidebar(activeTab)"
       class="fixed left-0 top-0 h-full flex flex-col pt-4 pb-8 bg-slate-50 dark:bg-slate-950 w-64 border-r border-slate-200 dark:border-slate-800 font-sans text-sm font-medium z-50">

    <!-- Brand header -->
    <div class="px-6 mb-8">
        <div class="text-lg font-black text-blue-800 dark:text-blue-300">Driver Portal</div>
        <div class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">Staff Access</div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 space-y-1">
        <a th:href="@{/staff/booking/trips}"
           th:class="${activeTab == 'trips'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">calendar_today</span>
            <span>Lịch trình</span>
        </a>

        <a th:href="@{/staff/booking/checkin}"
           th:class="${activeTab == 'checkin'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">confirmation_number</span>
            <span>Kiểm vé</span>
        </a>

        <a th:href="@{/staff/schedule}"
           th:class="${activeTab == 'schedule'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">event_note</span>
            <span>Lịch trình hôm nay</span>
        </a>

        <a href="#"
           th:class="${activeTab == 'notifications'}
               ? 'flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg px-4 py-3 mx-2 transition-all'
               : 'flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-blue-600 transition-all'">
            <span class="material-symbols-outlined">notifications</span>
            <div class="flex-1 flex justify-between items-center">
                <span>Thông báo</span>
            </div>
        </a>
    </nav>

    <!-- Bottom actions -->
    <div class="px-4 mb-6">
        <button class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-orange-500/20 transition-all">
            Bắt đầu ca trực
        </button>
    </div>

    <div class="pt-4 border-t border-slate-200 dark:border-slate-800 space-y-1">
        <a href="#" class="flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 mx-2 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all">
            <span class="material-symbols-outlined">support_agent</span>
            <span>Hỗ trợ</span>
        </a>
        <form th:action="@{/logout}" method="post" class="mx-2">
            <button type="submit"
                    class="w-full flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all rounded-lg">
                <span class="material-symbols-outlined">logout</span>
                <span>Đăng xuất</span>
            </button>
        </form>
    </div>
</aside>

</body>
</html>
