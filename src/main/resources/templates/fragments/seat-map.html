<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="seat-grid(deckList, deckName, deckType, legType, themeClass)" class="space-y-6">
    <h3 class="text-lg font-bold text-center text-primary-container" th:text="${deckName}">Tầng</h3>
    <div class="relative bg-surface-container-lowest rounded-[2rem] p-8 shadow-sm border-l-4" th:classappend="${themeClass}">
        <div class="grid grid-cols-3 gap-4">
            <th:block th:each="seat : ${deckList}">
                <button th:if="${seat.status.name() == 'AVAILABLE'}" type="button"
                        class="seat-btn relative w-full aspect-[4/5] bg-[#AACDDC] rounded-t-2xl rounded-b-lg flex flex-col items-center justify-center border-b-4 border-black/10 transition-all hover:-translate-y-1"
                        th:data-seat-id="${seat.seatId}"
                        th:data-deck="${deckType}"
                        th:data-leg="${legType}"
                        data-status="AVAILABLE">
                    <div class="absolute top-1.5 w-1/2 h-1 bg-white/40 rounded-full"></div>
                    <span class="text-[10px] font-bold text-slate-800 mt-2" th:text="${seat.seatId}"></span>
                </button>
                <button th:if="${seat.status.name() == 'BOOKED'}" type="button" disabled
                        class="relative w-full aspect-[4/5] bg-surface-dim opacity-40 rounded-t-2xl rounded-b-lg flex flex-col items-center justify-center border-b-4 border-black/5 cursor-not-allowed">
                    <span class="text-[10px] font-bold text-slate-500 mt-2" th:text="${seat.seatId}"></span>
                </button>
            </th:block>
        </div>
    </div>
</div>
</body>
</html>
