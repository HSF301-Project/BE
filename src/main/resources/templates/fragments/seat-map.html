<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="seat-grid(deckList, deckName, deckType, legType, themeClass)" class="space-y-3 md:space-y-4">
    <h3 class="text-sm md:text-base font-bold text-center text-primary-container" th:text="${deckName}">Tầng</h3>

    <div class="relative bg-surface-container-lowest rounded-[1.5rem] py-6 px-4 sm:px-6 shadow-sm border-l-4" th:classappend="${themeClass}">

        <div class="grid grid-cols-3 gap-y-3 sm:gap-y-4 gap-x-4 sm:gap-x-6 w-fit mx-auto">
            <th:block th:each="seat : ${deckList}">

                <button th:if="${seat.status.name() == 'AVAILABLE'}" type="button"
                        class="seat-btn relative w-10 sm:w-11 md:w-12 aspect-[4/5] bg-[#AACDDC] rounded-t-lg rounded-b flex flex-col items-center justify-center border-b-[3px] border-black/10 transition-all hover:-translate-y-1 hover:shadow-md"
                        th:data-seat-id="${seat.seatId}"
                        th:data-deck="${deckType}"
                        th:data-leg="${legType}"
                        data-status="AVAILABLE">
                    <div class="absolute top-1.5 sm:top-2 w-1/2 h-0.5 bg-white/60 rounded-full"></div>
                    <span class="text-[9px] sm:text-[10px] font-black text-slate-800 mt-1" th:text="${seat.seatId}"></span>
                </button>

                <button th:if="${seat.status.name() == 'BOOKED'}" type="button" disabled
                        class="relative w-10 sm:w-11 md:w-12 aspect-[4/5] bg-surface-dim opacity-40 rounded-t-lg rounded-b flex flex-col items-center justify-center border-b-[3px] border-black/5 cursor-not-allowed">
                    <div class="absolute top-1.5 sm:top-2 w-1/2 h-0.5 bg-white/40 rounded-full"></div>
                    <span class="text-[9px] sm:text-[10px] font-black text-slate-500 mt-1" th:text="${seat.seatId}"></span>
                </button>

            </th:block>
        </div>

    </div>
</div>
</body>
</html>
