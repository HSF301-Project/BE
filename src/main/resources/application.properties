 spring.application.name=BusTicket
spring.profiles.active=local
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BusTicket;encrypt=false
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# JPA / Hibernate settings
# NOTE: 'ddl-auto=update' is convenient for development only. Change to 'validate' or remove for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Optional: explicitly set dialect for SQL Server (can be omitted to let Hibernate autodetect)
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
